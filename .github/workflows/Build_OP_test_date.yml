name: OpenWrt_test_R2S
on:
  #  schedule:
  #    - cron: "0 17 * * *"
  workflow_dispatch:
  push:
    branches:
      - master
env:
  conf_name: r2s-bak-docker.config
  BRANCH_NAME: openwrt-22.03-R2S-201
  version_name: r2s

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v2

      - name: Init Building Dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo timedatectl set-timezone Asia/Shanghai
          docker rmi $(docker images -q)
          echo "--------------------------0------------------------------------"
          sudo -E apt-get remove -y --purge azure-cli ghc zulu* hhvm llvm* firefox google* dotnet* powershell mysql* php* mssql-tools msodbcsql17 android* || true
          echo "--------------------------1------------------------------------"
          sudo -E apt-get update -y
          echo "--------------------------2------------------------------------"
          echo "sudo -E apt-get full-upgrade -y"
          echo "--------------------------3------------------------------------"
          sudo -E apt-get install -y build-essential asciidoc binutils bzip2 coreutils gawk gettext git libncurses5-dev libz-dev patch unzip zlib1g-dev lib32gcc-s1 libc6-dev-i386 subversion flex uglifyjs git-core gcc-9 gcc++-9 gcc-9-multilib g++-9-multilib p7zip p7zip-full msmtp libssl-dev texinfo libreadline-dev libglib2.0-dev xmlto qemu-utils upx libelf-dev autoconf automake libtool autopoint ccache curl wget vim nano python3 python3-pip python3-ply haveged lrzsz device-tree-compiler scons antlr3 gperf ecj fastjar re2c xz-utils tar
          echo "--------------------------4------------------------------------"
          for i in $(ls /usr/bin/*-8); do sudo -E ln -sf $i ${i%%-8*}; done
          echo "--------------------------5------------------------------------"
          sudo -E ln -sf /usr/include/asm-generic /usr/include/asm
          echo "--------------------------6------------------------------------"
          sudo -E apt-get autoremove -y --purge
          echo "--------------------------7------------------------------------"
          sudo -E apt-get clean -y
          echo "--------------------------8------------------------------------"
          sudo -E swapoff -a
          echo "--------------------------9------------------------------------"
          sudo -E rm -rf /usr/share/dotnet /etc/mysql /etc/php /usr/local/lib/android /opt/ghc /swapfile /imagegeneration /mnt/swapfile /opt/hostedtoolcache /usr/local/.ghcup
          echo "--------------------------10------------------------------------"

      - name: Server Benchmark
        run: |
          wget -qO- --no-check-certificate https://raw.githubusercontent.com/SaintVamp/AutoBuild-OpenWRT/master/bench.sh | bash

      - name: Clone Source
        run: |
          cd "/home/runner"
          git clone --branch "${BRANCH_NAME}" --single-branch "https://github.com/SaintVamp/openwrt" "openwrt"
          sudo chown -R runner:runner "openwrt"
          cd "/home/runner/openwrt"
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Build OpenWrt
        run: |
          cd "/home/runner/openwrt"
          cp -f "${GITHUB_WORKSPACE}/configs/${conf_name}" ".config"
          make defconfig
          make -j$[$(nproc)+1]
      #        make -j$[$(nproc)+1] V=sc
      #        make -j1 V=sc

      - name: Prepare Release Zip File
        id: assemble_artifact
        run: |
          release_tag="${version_name}-$(date +%s)"
          echo "release_tag=$release_tag" >> $GITHUB_ENV
          cd "/home/runner/openwrt"
          mkdir -p ./artifact/package
          mkdir -p ./artifact/buildinfo
          
          # 定义要打包的特定 LuCI 应用列表
          LUCI_APPS="luci-app-firewall luci-app-wol luci-app-socat luci-app-cpu luci-app-aliddns"
          
          # 打包指定的 LuCI 应用
          for app in $LUCI_APPS; do
            echo "Finding and copying ${app}..."
            find ./bin/packages/ -type f -name "${app}*.ipk" -exec cp {} ./artifact/package/ \;
            find ./bin/targets/ -type f -name "${app}*.ipk" -exec cp {} ./artifact/package/ \;
          done
          
          # 打包 LuCI 核心组件（必需依赖）
          echo "Copying LuCI core components..."
          find ./bin/packages/ -type f \( -name "luci-base*.ipk" -o -name "luci-compat*.ipk" -o -name "luci-mod-admin-full*.ipk" -o -name "luci-mod-network*.ipk" -o -name "luci-mod-status*.ipk" -o -name "luci-mod-system*.ipk" \) -exec cp {} ./artifact/package/ \;
          find ./bin/targets/ -type f \( -name "luci-base*.ipk" -o -name "luci-compat*.ipk" -o -name "luci-mod-admin-full*.ipk" -o -name "luci-mod-network*.ipk" -o -name "luci-mod-status*.ipk" -o -name "luci-mod-system*.ipk" \) -exec cp {} ./artifact/package/ \;
          
          # 打包 LuCI 库依赖
          find ./bin/packages/ -type f \( -name "luci-lib-base*.ipk" -o -name "luci-lib-ip*.ipk" -o -name "luci-lib-jsonc*.ipk" -o -name "luci-lib-nixio*.ipk" \) -exec cp {} ./artifact/package/ \;
          find ./bin/targets/ -type f \( -name "luci-lib-base*.ipk" -o -name "luci-lib-ip*.ipk" -o -name "luci-lib-jsonc*.ipk" -o -name "luci-lib-nixio*.ipk" \) -exec cp {} ./artifact/package/ \;
          
          # 打包中文语言包
          echo "Copying Chinese language packs..."
          find ./bin/packages/ -type f -name "luci-i18n-*zh-cn*.ipk" -exec cp {} ./artifact/package/ \;
          find ./bin/targets/ -type f -name "luci-i18n-*zh-cn*.ipk" -exec cp {} ./artifact/package/ \;
          
          # 打包构建信息
          cp -rf $(find ./bin/targets/ -type f -name "*.buildinfo" -o -name "*.manifest") ./artifact/buildinfo/
          
          # 只创建 package 压缩包
          zip -q -0 -r OpenWrt-Package-SV-${release_tag}.zip ./artifact/package/
          zip -q -0 -r OpenWrt-BuildInfo-SV-${release_tag}.zip ./artifact/buildinfo/
          
          echo "=== Package Summary ==="
          echo "Total packages: $(ls artifact/package/ | wc -l)"
          ls -lh artifact/package/
          echo "---------------------"

      - name: Check Build Info
        id: check_build_info
        run: |
          echo ${GITHUB_WORKSPACE}
          cd "/home/runner/openwrt"
          echo "=== Build Info Files ==="
          ls -lh artifact/buildinfo/
          echo "---------------------"
          echo "=== Package Files ==="
          ls artifact/package/
          echo "---------------------"
          echo "=== Total Package Count ==="
          ls artifact/package/ | wc -l
          echo "---------------------"

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ env.release_tag }}
          release_name: OpenWrt-LuciApps-${{ env.release_tag }}
          draft: false
          prerelease: false
          body: |
            ## LuCI 应用包
            仅包含精选的 LuCI 应用程序，不包含固件和内核。
            
            ### 包含的应用：
            - luci-app-firewall (防火墙)
            - luci-app-wol (网络唤醒)
            - luci-app-socat (端口转发)
            - luci-app-cpu (CPU 状态监控)
            - luci-app-aliddns (阿里 DDNS)
            
            ### 安装说明：
            1. 下载 OpenWrt-Package-SV-*.zip
            2. 解压后上传到 OpenWrt 路由器
            3. 使用 opkg install *.ipk 安装

      - name: Upload Package Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /home/runner/openwrt/OpenWrt-Package-SV-${{env.release_tag}}.zip
          asset_name: OpenWrt-Package-SV-${{env.release_tag}}.zip
          asset_content_type: application/zip

      - name: Upload BuildInfo Asset
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: /home/runner/openwrt/OpenWrt-BuildInfo-SV-${{env.release_tag}}.zip
          asset_name: OpenWrt-BuildInfo-SV-${{env.release_tag}}.zip
          asset_content_type: application/zip

